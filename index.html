  <script>
    function displayMe(){

      const laptops = [
      {
      name: "ASUS ROG Strix G16",
      price:"₱58,999",
      location:"SM Clark"
      },
       {
      name: "Lenovo Leigion Pro 7i Gen 9",
      price:"₱150,000",
      location:"SM North Quezon City"
      },
       {
      name: "Acer Nitro V15",
      price:"₱₱26,999",
      location:"GameXtreme"
      },
    ]
     const search = document
     .getElementById(searchBox)
     .ariaValueMax
     .toLowerCase();

     const results = laptops.filter(laptop =>
      laptop.name.toLowerCase().includes(search) ||
      laptop.price.toLowerCase().includes(search) ||
      laptop.location.toLowerCase().includes(search) 
     );

     const list = document.getElementById(results);

     if(results === 0){
      alert("Sorry, we can't find your product...")
      return;
     }

     results.forEach(laptop => {
     
     let message= "Laptop Brand:" + laptop.name + "\n";
             "Price:" + laptop.price + "\n";
             "Location:" + laptop.location + "\n";
      alert(message);
            
     });
    }
    button.addEventListener("click", displayMe);
  </script>
